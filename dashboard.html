<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 8px;
    font-size: 1.8rem;
    color: #f1f5f9;
  }
  .subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 24px;
    font-size: 0.9rem;
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .controls select, .controls button {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .controls button:hover { background: #334155; }
  .controls button.active { background: #3b82f6; border-color: #3b82f6; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 20px;
  }
  .chart-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #334155;
    transition: border-color 0.2s;
  }
  .chart-card:hover { border-color: #3b82f6; }
  .chart-card h3 {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .chart-card canvas { width: 100% !important; }
  .stats {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 0.75rem;
    color: #64748b;
  }
  .stats span { display: inline-flex; align-items: center; gap: 4px; }
  .stats .val { color: #cbd5e1; font-weight: 600; }

  /* Modal overlay for enlarged chart */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: #1e293b;
    border-radius: 16px;
    padding: 24px;
    width: 90vw;
    max-width: 1100px;
    height: 70vh;
    border: 1px solid #334155;
    cursor: default;
  }
  .modal-content h3 {
    color: #e2e8f0;
    margin-bottom: 12px;
    font-size: 1.1rem;
  }
  .modal-chart-wrap { position: relative; height: calc(100% - 40px); }
</style>
</head>

14","2026-02-15","2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-02-21","2026-02-22","2026-02-23","2026-02-24","2026-02-25","2026-02-26","2026-03-04"],"times":[22751,26596,19844,26292,30454,24449,23876,28155,28401,21392,24686,24754,20740,21941,29031,23400,29755,25966,25643,23320,27436,22591,26852,24282,25136,26300,20622,24190,27883,25944,23428,36371]},"PERF_REGION_SPECTRAL_PROFILE_HDF5":{"dates":["2026-01-22","2026-01-28","2026-01-29","2026-01-30","2026-01-31","2026-02-01","2026-02-02","2026-02-03","2026-02-04","2026-02-05","2026-02-06","2026-02-07","2026-02-08","2026-02-09","2026-02-10","2026-02-11","2026-02-12","2026-02-13","2026-02-14","2026-02-15","2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-02-21","2026-02-22","2026-02-23","2026-02-24","2026-02-25","2026-02-26","2026-03-04"],"times":[2986,1473,1616,1463,1221,8700,8488,1455,1413,1373,2788,8623,1469,1467,1302,1473,1450,1329,1206,1394,2337,1399,9060,1140,1252,5902,2511,2864,1312,2595,1300,3220]}};

// Colors for each variant
const VARIANT_COLORS = {
  'CASA':  '#3b82f6',
  'FITS':  '#10b981',
  'HDF5':  '#f59e0b',
  'Mode0': '#3b82f6',
  'Mode1': '#10b981',
  'Mode2': '#f59e0b',
};

// Identify the variant suffix for a test name
const SUFFIXES = ['CASA', 'FITS', 'HDF5', 'Mode0', 'Mode1', 'Mode2'];

function getVariant(testName) {
  for (const s of SUFFIXES) {
    if (testName.endsWith('_' + s) || testName.endsWith(s)) return s;
  }
  return null;
}

function getGroupName(testName) {
  const variant = getVariant(testName);
  if (!variant) return testName;
  // Remove trailing _VARIANT or VARIANT
  if (testName.endsWith('_' + variant)) return testName.slice(0, -(variant.length + 1));
  return testName.slice(0, -variant.length);
}

// Group tests by base name
function groupTests() {
  const groups = {};
  Object.keys(DATA).forEach(name => {
    const group = getGroupName(name);
    if (!groups[group]) groups[group] = {};
    const variant = getVariant(name) || name;
    groups[group][variant] = DATA[name];
  });
  return groups;
}

function getStats(times) {
  const min = Math.min(...times);
  const max = Math.max(...times);
  const avg = times.reduce((a,b) => a+b, 0) / times.length;
  const n = times.length;
  const xMean = (n - 1) / 2;
  const yMean = avg;
  let num = 0, den = 0;
  for (let i = 0; i < n; i++) {
    num += (i - xMean) * (times[i] - yMean);
    den += (i - xMean) ** 2;
  }
  const slope = den ? num / den : 0;
  return { min, max, avg, slope };
}

function createGroupChart(canvas, groupName, variants, showLegend = false) {
  // Collect all unique dates across variants
  const allDates = new Set();
  Object.values(variants).forEach(v => v.dates.forEach(d => allDates.add(d)));
  const labels = [...allDates].sort();

  const datasets = [];
  Object.entries(variants).forEach(([variant, data]) => {
    const color = VARIANT_COLORS[variant] || '#94a3b8';
    // Map data to unified date labels (null for missing dates)
    const dateMap = {};
    data.dates.forEach((d, i) => { dateMap[d] = data.times[i]; });
    const values = labels.map(d => dateMap[d] !== undefined ? dateMap[d] : null);

    datasets.push({
      label: variant,
      data: values,
      borderColor: color,
      backgroundColor: color + '20',
      fill: false,
      tension: 0.3,
      pointRadius: 3,
      pointHoverRadius: 6,
      borderWidth: 2,
      spanGaps: true,
    });
  });

  return new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: !showLegend,
      aspectRatio: showLegend ? undefined : 2,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: true, labels: { color: '#94a3b8' } },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#e2e8f0',
          bodyColor: '#cbd5e1',
          borderColor: '#334155',
          borderWidth: 1,
          callbacks: {
            label: ctx => ctx.parsed.y !== null ? `${ctx.dataset.label}: ${ctx.parsed.y} ms` : null
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#64748b', maxRotation: 45, font: { size: 10 } },
          grid: { color: '#1e293b' }
        },
        y: {
          title: { display: true, text: 'Milliseconds', color: '#64748b' },
          ticks: { color: '#64748b' },
          grid: { color: '#283548' }
        }
      }
    }
  });
}

// Populate filter dropdown
const groups = groupTests();
const filterEl = document.getElementById('filter');
Object.keys(groups).sort().forEach(group => {
  const opt = document.createElement('option');
  opt.value = group;
  opt.textContent = group.replace('PERF_', '').replace(/_/g, ' ');
  filterEl.appendChild(opt);
});

let charts = [];

function renderGrid(filter = 'ALL') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  charts.forEach(c => c.destroy());
  charts = [];

  let entries = Object.entries(groups);
  if (filter !== 'ALL') {
    entries = entries.filter(([name]) => name === filter);
  }

  entries.sort((a, b) => a[0].localeCompare(b[0]));

  entries.forEach(([groupName, variants]) => {
    const card = document.createElement('div');
    card.className = 'chart-card';

    // Build stats for each variant
    let statsHtml = '';
    Object.entries(variants).forEach(([variant, data]) => {
      const stats = getStats(data.times);
      const color = VARIANT_COLORS[variant] || '#94a3b8';
      statsHtml += `
        <div class="stats">
          <span style="color:${color};font-weight:600">${variant}:</span>
          <span>Min: <span class="val">${stats.min} ms</span></span>
          <span>Max: <span class="val">${stats.max} ms</span></span>
          <span>Avg: <span class="val">${stats.avg.toFixed(0)} ms</span></span>
          <span>Trend: <span class="val" style="color:${stats.slope > 1 ? '#f87171' : stats.slope < -1 ? '#34d399' : '#94a3b8'}">${stats.slope > 0 ? '+' : ''}${stats.slope.toFixed(1)} ms/day</span></span>
        </div>`;
    });

    card.innerHTML = `
      <h3>${groupName}</h3>
      <canvas></canvas>
      ${statsHtml}
    `;
    grid.appendChild(card);

    const canvas = card.querySelector('canvas');
    const chart = createGroupChart(canvas, groupName, variants);
    charts.push(chart);

    // Click to enlarge
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => openModal(groupName, variants));
  });
}

// Modal
let modalChart = null;
const modal = document.getElementById('modal');

function openModal(groupName, variants) {
  modal.classList.add('active');
  document.getElementById('modalTitle').textContent = groupName;
  if (modalChart) modalChart.destroy();
  modalChart = createGroupChart(document.getElementById('modalCanvas'), groupName, variants, true);
  modalChart.options.maintainAspectRatio = false;
  modalChart.resize();
}

modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.classList.remove('active');
    if (modalChart) { modalChart.destroy(); modalChart = null; }
  }
});

// Controls
filterEl.addEventListener('change', () => renderGrid(filterEl.value));

renderGrid();
</script>
