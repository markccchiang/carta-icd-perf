<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARTA ICD Performance Tests</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<h1>CARTA ICD Performance Tests</h1>
<p class="subtitle">Elapsed time trends across test runs</p>

<div class="controls">
  <label class="date-label">From <input type="date" id="dateFrom"></label>
  <label class="date-label">To <input type="date" id="dateTo"></label>
  <select id="filter">
    <option value="ALL">All Tests</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<!-- Modal for enlarged chart -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <div class="modal-chart-wrap">
      <canvas id="modalCanvas"></canvas>
    </div>
  </div>
</div>

<script>
  var s = document.createElement('script');
  s.src = 'data.js?t=' + Date.now();
  s.onload = function() {
    var d = document.createElement('script');
    d.src = 'dashboard.js';
    document.body.appendChild(d);
  };
  document.body.appendChild(s);
</script>
</body>
</html>
